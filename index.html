<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <title>Tablas de Multiplicar</title>

    <style>
        body {
            font-family: 'Franklin Gothic Medium', 'Arial Narrow', Arial, sans-serif;
            background-color: #f4f4f9;
            display: flex; 
            flex-direction: column; 
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        h2 {
            color: #313a5d;
            text-align: center;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        button {
            background-color: #313a5d;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 1.1rem;
            font-family: inherit;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            margin-bottom: 40px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #1a1f33;
        }

        #contenedor-tablas {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            max-width: 1200px;
        }

        .tabla-card {
            color: #0b2239;
            background-color: #97ccde;
            padding: 15px 25px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            text-align: center;
            font-size: 1.1rem;
            font-weight: bold;
            width: 180px;
            line-height: 1.6;
        }

        .tabla-card h3 {
            margin-top: 0;
            border-bottom: 2px solid #0b2239;
            padding-bottom: 10px;
        }

    </style>
</head>
<body>

    <h2>Generador de Tablas de Multiplicar</h2>
    
    <button onclick="generarTablas()">Generar Tablas de Multiplicar</button>

    <div id="contenedor-tablas"></div>

    <script>
        function generarTablas() {
            const contenedor = document.getElementById("contenedor-tablas");
            contenedor.innerHTML = ""; 

            for (let i = 1; i <= 10; i++) {
                let tablaHTML = "<div class='tabla-card'>";
                tablaHTML += "<h3>Tabla del " + i + "</h3>";
                
                for (let j = 1; j <= 10; j++) {
                    let resultado = i * j;
                    tablaHTML += i + " x " + j + " = " + resultado + "<br>";
                }
                
                tablaHTML += "</div>";
                contenedor.innerHTML += tablaHTML;
            }
        }
    </script>

</body>
</html>
